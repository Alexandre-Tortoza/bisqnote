server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ────────────────────────────────────────────────────────
    # Prevent content-type sniffing attacks
    add_header X-Content-Type-Options "nosniff" always;
    # Disallow framing to mitigate clickjacking
    add_header X-Frame-Options "DENY" always;
    # Force browsers to use the declared content-type (legacy XSS filter)
    add_header X-XSS-Protection "1; mode=block" always;
    # Do not send the Referer header to cross-origin destinations
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Restrict browser feature APIs to reduce attack surface
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    # Content Security Policy: restrict resource origins to self and the API
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # ── API proxy → backend service ─────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vue Router history mode
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No cache for index.html
    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
